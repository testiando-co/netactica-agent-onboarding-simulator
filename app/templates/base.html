<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Phone TI{% endblock %}</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            min-height: 100vh;
            color: #e2e8f0;
        }

        /* --- Navbar --- */
        .navbar {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(99, 102, 241, 0.2);
            padding: 0 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 64px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .navbar-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.2rem;
            font-weight: 700;
            color: #818cf8;
            text-decoration: none;
        }
        .navbar-brand svg { flex-shrink: 0; }
        .navbar-actions a {
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.875rem;
            padding: 8px 16px;
            border-radius: 8px;
            transition: all 0.2s;
        }
        .navbar-actions a:hover {
            color: #e2e8f0;
            background: rgba(99, 102, 241, 0.15);
        }

        /* --- Cards --- */
        .card {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(99, 102, 241, 0.15);
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.2);
        }
        .card-header {
            font-size: 1.1rem;
            font-weight: 600;
            color: #c7d2fe;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* --- Forms --- */
        .form-group {
            margin-bottom: 1.25rem;
        }
        .form-label {
            display: block;
            font-size: 0.8rem;
            font-weight: 500;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 6px;
        }
        .form-input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(99, 102, 241, 0.25);
            border-radius: 10px;
            color: #e2e8f0;
            font-size: 0.95rem;
            transition: all 0.2s;
            outline: none;
        }
        .form-input:focus {
            border-color: #818cf8;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
        }
        .form-input::placeholder { color: #475569; }

        /* --- Buttons --- */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }
        .btn-primary {
            background: linear-gradient(135deg, #6366f1, #818cf8);
            color: #fff;
            box-shadow: 0 2px 12px rgba(99, 102, 241, 0.3);
        }
        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.45);
        }
        .btn-primary:active { transform: translateY(0); }

        /* --- Table --- */
        .table-wrapper {
            overflow-x: auto;
            border-radius: 12px;
            border: 1px solid rgba(99, 102, 241, 0.12);
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        thead th {
            background: rgba(99, 102, 241, 0.1);
            padding: 14px 18px;
            text-align: left;
            font-size: 0.75rem;
            font-weight: 600;
            color: #818cf8;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            border-bottom: 1px solid rgba(99, 102, 241, 0.15);
        }
        tbody td {
            padding: 14px 18px;
            font-size: 0.9rem;
            color: #cbd5e1;
            border-bottom: 1px solid rgba(99, 102, 241, 0.06);
        }
        tbody tr { transition: background 0.15s; }
        tbody tr:hover { background: rgba(99, 102, 241, 0.06); }
        tbody tr:last-child td { border-bottom: none; }
        .empty-row td {
            text-align: center;
            color: #64748b;
            padding: 2rem;
        }

        /* --- Alerts --- */
        .alert {
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 0.9rem;
            margin-bottom: 1.25rem;
        }
        .alert-error {
            background: rgba(239, 68, 68, 0.12);
            border: 1px solid rgba(239, 68, 68, 0.25);
            color: #fca5a5;
        }
        .alert-success {
            background: rgba(34, 197, 94, 0.12);
            border: 1px solid rgba(34, 197, 94, 0.25);
            color: #86efac;
        }

        /* --- Badge --- */
        .badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .badge-count {
            background: rgba(99, 102, 241, 0.15);
            color: #a5b4fc;
        }

        /* --- Layout --- */
        .container {
            max-width: 960px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        /* --- Login centered --- */
        .login-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 64px);
            padding: 2rem;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
        }
        .login-title {
            text-align: center;
            margin-bottom: 2rem;
        }
        .login-title h1 {
            font-size: 1.5rem;
            color: #e2e8f0;
            margin-top: 12px;
        }
        .login-title p {
            color: #64748b;
            font-size: 0.9rem;
            margin-top: 4px;
        }
        .login-icon {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #6366f1, #818cf8);
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 16px rgba(99, 102, 241, 0.3);
        }

        /* --- Dashboard grid --- */
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }
        .grid-3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 1.5rem;
        }
        @media (max-width: 768px) {
            .grid-3 { grid-template-columns: 1fr; }
        }
        @media (max-width: 640px) {
            .grid-2 { grid-template-columns: 1fr; }
        }

        /* --- Stats --- */
        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: #818cf8;
        }
        .stat-label {
            font-size: 0.8rem;
            color: #64748b;
            margin-top: 2px;
        }

        /* --- Misc --- */
        .mt-6 { margin-top: 1.5rem; }
        .mb-6 { margin-bottom: 1.5rem; }
        .text-muted { color: #64748b; }
        .phone-mono { font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace; }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="/dashboard" class="navbar-brand">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#818cf8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
            </svg>
            Phone TI
        </a>
        <div class="navbar-actions">
            {% block nav_actions %}{% endblock %}
        </div>
    </nav>
    {% block body %}{% endblock %}
</body>
</html>
